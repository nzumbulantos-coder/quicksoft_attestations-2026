<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Nouveau Candidat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #212529;
            font-size: 1.8rem;
            border-bottom: 2px solid #2b70b4;
            padding-bottom: 10px;
        }
        .form-group {
            margin-top: 20px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2b70b4;
            box-shadow: 0 0 0 3px rgba(43, 112, 180, 0.25);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2b70b4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d5287;
        }
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.95rem;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Enregistrer un Candidat</h2>
        
        <form id="candidat-form">
            <div class="form-group">
                <label for="nom-complet">Nom complet du candidat</label>
                <input type="text" id="nom-complet" placeholder="Ex: KABENE MUSHAGALUSA CHRISTIAN" required autocomplete="off">
            </div>
            
            <button type="submit">Enregistrer dans la Base</button>
        </form>

        <div id="status" class="status-message"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000/api/candidat";

        document.getElementById('candidat-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Empêche le rechargement de la page

            const nomInput = document.getElementById('nom-complet');
            const statusDiv = document.getElementById('status');
            const nomComplet = nomInput.value;

            // Réinitialisation du message de statut
            statusDiv.className = "status-message";
            statusDiv.style.display = "none";

            try {
                // Envoi des données en POST vers notre serveur Flask
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nom_complet: nomComplet })
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = `<strong>Succès !</strong><br>${result.nom_complet} a été ajouté.<br><small>ID : ${result.id}</small>`;
                    statusDiv.classList.add('success');
                    nomInput.value = ''; // Vide le champ après l'enregistrement
                } else {
                    statusDiv.innerText = result.error || "Une erreur est survenue.";
                    statusDiv.classList.add('error');
                }

            } catch (err) {
                statusDiv.innerText = "Impossible de se connecter à l'API locale. Vérifiez que Python est lancé.";
                statusDiv.classList.add('error');
                console.error(err);
            }
        });
    </script>
</body>
</html>
